naftiko: 1.0.0-alpha2
info:
  label: R Versions API — Versions
  description: 'R Versions API — Versions. 5 operations. Lead operation: Get Previous R Release. Self-contained Naftiko capability
    covering one R business surface.'
  tags:
  - R
  - Versions
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    R_API_KEY: R_API_KEY
capability:
  consumes:
  - type: http
    namespace: rversions-versions
    baseUri: https://rversions.r-pkg.org
    description: R Versions API — Versions business capability. Self-contained, no shared references.
    resources:
    - name: r-oldrel
      path: /r-oldrel
      operations:
      - name: getroldrel
        method: GET
        description: Get Previous R Release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: r-release
      path: /r-release
      operations:
      - name: getrrelease
        method: GET
        description: Get Current R Release
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: r-release-macos
      path: /r-release-macos
      operations:
      - name: getrreleasemacos
        method: GET
        description: Get Current R Release for macOS
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: r-release-win
      path: /r-release-win
      operations:
      - name: getrreleasewindows
        method: GET
        description: Get Current R Release for Windows
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: r-versions
      path: /r-versions
      operations:
      - name: listrversions
        method: GET
        description: List All R Versions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: rversions-versions-rest
    port: 8080
    description: REST adapter for R Versions API — Versions. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/r-oldrel
      name: r-oldrel
      description: REST surface for r-oldrel.
      operations:
      - method: GET
        name: getroldrel
        description: Get Previous R Release
        call: rversions-versions.getroldrel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/r-release
      name: r-release
      description: REST surface for r-release.
      operations:
      - method: GET
        name: getrrelease
        description: Get Current R Release
        call: rversions-versions.getrrelease
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/r-release-macos
      name: r-release-macos
      description: REST surface for r-release-macos.
      operations:
      - method: GET
        name: getrreleasemacos
        description: Get Current R Release for macOS
        call: rversions-versions.getrreleasemacos
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/r-release-win
      name: r-release-win
      description: REST surface for r-release-win.
      operations:
      - method: GET
        name: getrreleasewindows
        description: Get Current R Release for Windows
        call: rversions-versions.getrreleasewindows
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/r-versions
      name: r-versions
      description: REST surface for r-versions.
      operations:
      - method: GET
        name: listrversions
        description: List All R Versions
        call: rversions-versions.listrversions
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rversions-versions-mcp
    port: 9090
    transport: http
    description: MCP adapter for R Versions API — Versions. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-previous-r-release
      description: Get Previous R Release
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rversions-versions.getroldrel
      outputParameters:
      - type: object
        mapping: $.
    - name: get-current-r-release
      description: Get Current R Release
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rversions-versions.getrrelease
      outputParameters:
      - type: object
        mapping: $.
    - name: get-current-r-release-macos
      description: Get Current R Release for macOS
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rversions-versions.getrreleasemacos
      outputParameters:
      - type: object
        mapping: $.
    - name: get-current-r-release-windows
      description: Get Current R Release for Windows
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rversions-versions.getrreleasewindows
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-r-versions
      description: List All R Versions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rversions-versions.listrversions
      outputParameters:
      - type: object
        mapping: $.
