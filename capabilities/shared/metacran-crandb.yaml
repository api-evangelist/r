naftiko: "1.0.0-alpha1"

info:
  label: "METACRAN CranDB API"
  description: "CouchDB-based REST API providing metadata for all CRAN R packages including version history, dependencies, maintainer info, and package listings."
  tags:
    - R
    - CRAN
    - Packages
    - Metadata
    - Open Source
  created: "2026-05-02"
  modified: "2026-05-02"

binds: []

capability:
  consumes:
    - type: http
      namespace: crandb
      baseUri: https://crandb.r-pkg.org
      description: "METACRAN CranDB public API — no authentication required"
      resources:
        - name: packages
          path: /
          description: "CRAN package metadata"
          operations:
            - name: get-package
              method: GET
              description: "Get metadata for the latest version of a CRAN package"
              inputParameters:
                - name: package
                  in: path
                  type: string
                  required: true
                  description: "CRAN package name"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: get-package-version
              method: GET
              description: "Get metadata for a specific version of a CRAN package"
              inputParameters:
                - name: package
                  in: path
                  type: string
                  required: true
                  description: "CRAN package name"
                - name: version
                  in: path
                  type: string
                  required: true
                  description: "Version string or 'all'"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: all-packages
          path: /-/pkgs
          description: "All CRAN package names and versions"
          operations:
            - name: list-all-packages
              method: GET
              description: "List all CRAN packages with latest versions"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8102
      namespace: crandb-rest
      resources:
        - path: /v1/packages/{package}
          name: packages
          operations:
            - method: GET
              name: get-package
              call: "crandb.get-package"
              with:
                package: "rest.package"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/packages
          name: all-packages
          operations:
            - method: GET
              name: list-all-packages
              call: "crandb.list-all-packages"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: crandb-mcp
      transport: http
      tools:
        - name: get-cran-package
          description: "Get metadata for a CRAN R package including version, description, author, dependencies, and license"
          hints:
            readOnly: true
            openWorld: false
          call: "crandb.get-package"
          with:
            package: "tools.package"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-all-cran-packages
          description: "List all R packages available on CRAN with their latest version numbers"
          hints:
            readOnly: true
            openWorld: false
          call: "crandb.list-all-packages"
          outputParameters:
            - type: object
              mapping: "$."
